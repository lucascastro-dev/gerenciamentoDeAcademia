services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: academia-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: gerenciamento_academia
      POSTGRES_USER: academia_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-academia_dev_secret}
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_buffers=64MB
      -c max_connections=50
      -c work_mem=4MB
    mem_limit: ${POSTGRES_MEM_LIMIT:-384m}
    cpus: ${POSTGRES_CPUS:-0.5}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academia_app -d gerenciamento_academia"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: academia-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseContainerSupport -Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
      APP_MASTER_CPF: ${APP_MASTER_CPF:-00000000191}
      APP_MASTER_PASSWORD: ${APP_MASTER_PASSWORD:-Master@2024!}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-academia_dev_secret}
      APP_SEED_DEMO: ${APP_SEED_DEMO:-true}
      APP_BOOTSTRAP_MASTER: ${APP_BOOTSTRAP_MASTER:-true}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - certificados_data:/app/certificados
    mem_limit: ${BACKEND_MEM_LIMIT:-768m}
    memswap_limit: ${BACKEND_MEM_LIMIT:-768m}
    cpus: ${BACKEND_CPUS:-1.5}
    init: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/srv-gerenciaracademia}
    container_name: academia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "0.0.0.0:${APP_PORT:-5173}:80"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Túnel HTTPS público (internet). URL: docker compose logs tunnel  ou  URL_PUBLICA.txt
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: academia-tunnel
    restart: unless-stopped
    command: tunnel --url http://frontend:80
    depends_on:
      - frontend

volumes:
  postgres_data:
  certificados_data:
