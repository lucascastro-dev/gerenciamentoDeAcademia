# Configuracoes da aplicacao
server.servlet.context-path=/srv-gerenciaracademia
server.port=8000

# Uteis
spring.application.name=turma360
springdoc.version=${project.version:1.0.0}

# Perfil padrão: PostgreSQL local persistente (ver application-local.properties)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Perfil h2 (testes rápidos): SPRING_PROFILES_ACTIVE=h2 mvn spring-boot:run

spring.jpa.properties.hibernate.bytecode.provider=bytebuddy
spring.jpa.open-in-view=false

# Spring Data REST não é usado; desativa exposição automática de repositórios
spring.data.rest.enabled=false

spring.main.allow-circular-references=true

spring.jackson.time-zone=America/Sao_Paulo

spring.servlet.multipart.max-file-size=10MB
api.security.token.secret=${JWT_SECRET:my-secret-key-change-in-production-32chars}

# Pasta de saída dos certificados gerados (templates ficam em classpath:certificados/)
app.certificado.base-path=${CERTIFICADO_PATH:./certificados}
app.remuneracao.documentos.base-path=${REMUNERACAO_DOCS_PATH:./documentos-remuneracao}
app.cobranca.dias-tolerancia=${COBRANCA_DIAS_TOLERANCIA:5}

# Integrações (modo local = simulação sem credenciais reais)
app.integracoes.modo-local=${APP_INTEGRACOES_MODO_LOCAL:true}
app.integracoes.brevo.enabled=${BREVO_ENABLED:false}
app.integracoes.brevo.api-key=${BREVO_API_KEY:}
app.integracoes.brevo.sender-email=${BREVO_SENDER_EMAIL:}
app.integracoes.brevo.sender-name=Turma360
app.integracoes.twilio.enabled=${TWILIO_ENABLED:false}
app.integracoes.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.integracoes.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.integracoes.twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}
app.integracoes.asaas.enabled=${ASAAS_ENABLED:false}
app.integracoes.asaas.api-key=${ASAAS_API_KEY:}
app.integracoes.asaas.base-url=${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
app.integracoes.asaas.webhook-token=${ASAAS_WEBHOOK_TOKEN:}

app.master.cpf=${APP_MASTER_CPF:00000000191}
app.master.password=${APP_MASTER_PASSWORD:Master@2024!}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

logging.level.root=INFO
logging.level.gerenciamentoDeAcademia=INFO