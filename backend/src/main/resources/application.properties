# Configuracoes da aplicacao
server.servlet.context-path=/srv-gerenciaracademia
server.port=8000

# Uteis
spring.application.name=edugestao-inteligente
springdoc.version=${project.version:1.0.0}

# Perfil padrão: PostgreSQL local persistente (ver application-local.properties)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Perfil h2 (testes rápidos): SPRING_PROFILES_ACTIVE=h2 mvn spring-boot:run

spring.jpa.properties.hibernate.bytecode.provider=bytebuddy
spring.jpa.open-in-view=false

# Spring Data REST não é usado; desativa exposição automática de repositórios
spring.data.rest.enabled=false

spring.main.allow-circular-references=true

spring.servlet.multipart.max-file-size=10MB
api.security.token.secret=${JWT_SECRET:my-secret-key-change-in-production-32chars}

# Pasta de saída dos certificados gerados (templates ficam em classpath:certificados/)
app.certificado.base-path=${CERTIFICADO_PATH:./certificados}
app.cobranca.dias-tolerancia=${COBRANCA_DIAS_TOLERANCIA:5}

app.master.cpf=${APP_MASTER_CPF:00000000191}
app.master.password=${APP_MASTER_PASSWORD:Master@2024!}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

logging.level.root=INFO
logging.level.gerenciamentoDeAcademia=INFO