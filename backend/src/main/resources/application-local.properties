# Desenvolvimento local com PostgreSQL persistente (docker compose up postgres -d)
spring.datasource.url=jdbc:postgresql://localhost:5435/gerenciamento_academia
spring.datasource.username=academia_app
# Deve ser igual ao POSTGRES_PASSWORD do docker-compose / arquivo .env na raiz
spring.datasource.password=academia_dev_secret
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.h2.console.enabled=false

spring.jpa.show-sql=false

# Saída dos certificados gerados (relativo ao diretório de execução do backend)
app.certificado.base-path=${CERTIFICADO_PATH:./certificados}
