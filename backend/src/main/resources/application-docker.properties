# Profile docker: PostgreSQL + seed master
spring.datasource.url=jdbc:postgresql://postgres:5432/gerenciamento_academia?characterEncoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.datasource.username=academia_app
spring.datasource.password=${POSTGRES_PASSWORD:academia_dev_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.h2.console.enabled=false

app.certificado.base-path=/app/certificados
app.master.cpf=${APP_MASTER_CPF:00000000191}
app.master.password=${APP_MASTER_PASSWORD:Master@2024!}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

logging.level.root=INFO
logging.level.gerenciamentoDeAcademia=DEBUG
logging.level.org.springframework.security=WARN

# CORS para Vite local e acesso por IP/host na rede (API também pode ser chamada na :8000)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:80
app.cors.allowed-origin-patterns=http://*:5173,http://*:[0-9]*
