# Profile docker: PostgreSQL + seeds de dev/teste
spring.datasource.url=jdbc:postgresql://postgres:5432/gerenciamento_academia?characterEncoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.datasource.username=academia_app
spring.datasource.password=${POSTGRES_PASSWORD:academia_dev_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.h2.console.enabled=false

# Startup mais leve em dev Docker (custo na 1ª requisição de cada bean)
spring.main.lazy-initialization=true

# Pool e threads enxutos para ambiente de testes
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

server.tomcat.threads.max=25
server.tomcat.threads.min-spare=2
server.tomcat.accept-count=50
server.tomcat.max-connections=100
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

app.certificado.base-path=/app/certificados
app.master.cpf=${APP_MASTER_CPF:00000000191}
app.master.password=${APP_MASTER_PASSWORD:Master@2024!}

app.bootstrap.master-enabled=${APP_BOOTSTRAP_MASTER:true}
app.seed.demo-enabled=${APP_SEED_DEMO:true}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

logging.level.root=WARN
logging.level.gerenciamentoDeAcademia=INFO
logging.level.org.springframework.security=WARN

# CORS para Vite local e acesso por IP/host na rede (API também pode ser chamada na :8000)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:80
app.cors.allowed-origin-patterns=https://*.trycloudflare.com,http://*:5173,http://*:[0-9]*
